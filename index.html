 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="tailwind.init.css">
</head>
<body>

<div class="container">
    <h1>Job Application Tracker</h1>

    <div class="dashboard">
        <div class="stat-card total">
            <p>Total</p>
            <h2 id="total-count">0</h2>
        </div>
        <div class="stat-card interview">
            <p>Interview</p>
            <h2 id="interview-count">0</h2>
        </div>
        <div class="stat-card rejected">
            <p>Rejected</p>
            <h2 id="rejected-count">0</h2>
        </div>
    </div>

    <div class="section-header">
    <h2>Available Jobs</h2>
    <span id="tab-job-count">0 jobs</span>
</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="changeTab('ALL')">All</button>
        <button class="tab-btn" onclick="changeTab('INTERVIEW')">Interview</button>
        <button class="tab-btn" onclick="changeTab('REJECTED')">Rejected</button>
    </div>

    <div id="jobs-container"></div>
</div>

<script src="script.js"></script>
</body>
</html>
